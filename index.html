<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>테트리스 - 바이브 코딩 실습</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111827;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Consolas', monospace;
      color: #e2e8f0;
    }
    .game-container {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }
    #gameCanvas {
      border: 2px solid #334155;
      background: #0f172a;
      display: block;
    }
    .side-panel {
      width: 150px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .panel-box {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px;
    }
    .panel-box h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #64748b;
      margin-bottom: 8px;
    }
    .panel-box .value {
      font-size: 28px;
      font-weight: bold;
      color: #e2e8f0;
    }

    /* ── NEXT 블록 미리보기 패널 ── */
    #nextCanvas {
      display: block;
      margin: 0 auto;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 4px;
    }

    #overlay {
      display: none;
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.75);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 16px;
      font-size: 24px;
      color: #f1f5f9;
    }
    #overlay.show { display: flex; }
    #restartBtn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 10px 28px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Consolas', monospace;
    }
    #restartBtn:hover { background: #2563eb; }
    .canvas-wrapper { position: relative; }
    .controls {
      font-size: 12px;
      color: #475569;
      line-height: 1.8;
    }
  </style>
</head>
<body>

<div class="game-container">
  <div class="canvas-wrapper">
    <canvas id="gameCanvas" width="300" height="600"></canvas>
    <div id="overlay">
      <div>GAME OVER</div>
      <button id="restartBtn">다시 시작</button>
    </div>
  </div>

  <div class="side-panel">
    <!-- NEXT 블록 미리보기 (사이드 패널 최상단) -->
    <div class="panel-box">
      <h3>NEXT</h3>
      <canvas id="nextCanvas" width="126" height="84"></canvas>
    </div>

    <div class="panel-box">
      <h3>점수</h3>
      <div class="value" id="scoreDisplay">0</div>
    </div>
    <div class="panel-box">
      <h3>레벨</h3>
      <div class="value" id="levelDisplay">1</div>
    </div>
    <div class="panel-box">
      <h3>라인</h3>
      <div class="value" id="linesDisplay">0</div>
    </div>
    <div class="panel-box controls">
      <h3>조작법</h3>
      ← → 이동<br>
      ↑ 회전<br>
      ↓ 빠르게<br>
      Space 즉시 드롭<br>
    </div>
  </div>
</div>

<script>
// ============================================================
//  ■ 상수 정의
// ============================================================
const COLS       = 10;
const ROWS       = 20;
const BLOCK_SIZE = 30;
const NEXT_BLOCK = 21; // NEXT 미리보기 캔버스 한 칸 픽셀 크기

const SHAPES = {
  I: [[1, 1, 1, 1]],
  O: [[1, 1], [1, 1]],
  T: [[0, 1, 0], [1, 1, 1]],
  S: [[0, 1, 1], [1, 1, 0]],
  Z: [[1, 1, 0], [0, 1, 1]],
  L: [[1, 0], [1, 0], [1, 1]],
  J: [[0, 1], [0, 1], [1, 1]],
};

const COLORS = {
  I: '#00f0f0', O: '#f0f000', T: '#a000f0',
  S: '#00f000', Z: '#f00000', L: '#f0a000', J: '#0000f0',
};

const PIECE_TYPES = Object.keys(SHAPES);

// ============================================================
//  ■ 캔버스 초기화
// ============================================================
const canvas     = document.getElementById('gameCanvas');
const ctx        = canvas.getContext('2d');
const nextCanvas = document.getElementById('nextCanvas');
const nCtx       = nextCanvas.getContext('2d');

// ============================================================
//  ■ 게임 상태 변수
// ============================================================
let board        = [];
let currentPiece = null;
let nextPiece    = null;   // 다음 블록 정보 { shape, color }
let score        = 0;
let level        = 1;
let linesCleared = 0;
let gameOver     = false;
let lastTime     = 0;
let dropInterval = 1000;

// ──────────────────────────────────────────────────────────
//  드롭 후 입력 잠금 플래그
//  ArrowDown / Space 키를 누른 채로 다음 블록이 빠르게
//  내려가는 현상을 막기 위해 블록 고정 직후 일시적으로
//  드롭 관련 입력을 차단합니다.
// ──────────────────────────────────────────────────────────
let dropLocked    = false;
let dropLockTimer = null;

// 드롭 후 입력 잠금 해제 대기 시간 (ms)
const DROP_LOCK_MS = 250;

function lockDropInput() {
  dropLocked = true;
  clearTimeout(dropLockTimer);
  dropLockTimer = setTimeout(() => { dropLocked = false; }, DROP_LOCK_MS);
}

// ============================================================
//  ■ 단일 블록 그리기 헬퍼
// ============================================================
function drawBlock(x, y, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
  // 윗면 하이라이트
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE - 1, 4);
}

// ============================================================
//  ■ 보드 초기화
// ============================================================
function initBoard() {
  board = [];
  for (let r = 0; r < ROWS; r++) {
    board.push(new Array(COLS).fill(null));
  }
}

// ============================================================
//  ■ 블록 생성
//  nextPiece가 있으면 그것을 currentPiece로 사용하고,
//  새로운 nextPiece를 무작위로 생성합니다.
// ============================================================
function createPiece() {
  // nextPiece를 currentPiece로 승격
  if (nextPiece) {
    const shape  = nextPiece.shape;
    const color  = nextPiece.color;
    const startX = Math.floor((COLS - shape[0].length) / 2);
    currentPiece = { shape, color, x: startX, y: 0 };
  } else {
    // 게임 시작 시 최초 1회
    const type   = PIECE_TYPES[Math.floor(Math.random() * PIECE_TYPES.length)];
    const shape  = SHAPES[type];
    const startX = Math.floor((COLS - shape[0].length) / 2);
    currentPiece = { shape, color: COLORS[type], x: startX, y: 0 };
  }

  // 다음 블록 무작위 생성
  const nextType = PIECE_TYPES[Math.floor(Math.random() * PIECE_TYPES.length)];
  nextPiece = { shape: SHAPES[nextType], color: COLORS[nextType] };

  // NEXT 미리보기 캔버스 갱신
  drawNextPiece();
}

// ============================================================
//  ■ NEXT 미리보기 캔버스에 다음 블록 그리기
// ============================================================
function drawNextPiece() {
  nCtx.fillStyle = '#0f172a';
  nCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);

  if (!nextPiece) return;

  const shape = nextPiece.shape;
  const color = nextPiece.color;
  const cols  = shape[0].length;
  const rows  = shape.length;

  // 캔버스 중앙에 블록을 배치하기 위한 오프셋 계산
  const offsetX = Math.floor((nextCanvas.width  - cols * NEXT_BLOCK) / 2);
  const offsetY = Math.floor((nextCanvas.height - rows * NEXT_BLOCK) / 2);

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (!shape[r][c]) continue;

      const px = offsetX + c * NEXT_BLOCK;
      const py = offsetY + r * NEXT_BLOCK;

      nCtx.fillStyle = color;
      nCtx.fillRect(px, py, NEXT_BLOCK - 1, NEXT_BLOCK - 1);
      // 윗면 하이라이트
      nCtx.fillStyle = 'rgba(255,255,255,0.2)';
      nCtx.fillRect(px, py, NEXT_BLOCK - 1, 3);
    }
  }
}

// ============================================================
//  ■ 충돌 감지
// ============================================================
function isCollision(piece, dx, dy) {
  for (let row = 0; row < piece.shape.length; row++) {
    for (let col = 0; col < piece.shape[row].length; col++) {
      if (!piece.shape[row][col]) continue;

      const newX = piece.x + col + dx;
      const newY = piece.y + row + dy;

      if (newX < 0 || newX >= COLS) return true; // ① 벽 충돌
      if (newY >= ROWS)             return true; // ② 바닥 충돌
      if (newY >= 0 && board[newY][newX] !== null) return true; // ③ 블록 충돌
    }
  }
  return false;
}

// ============================================================
//  ■ 90도 시계 방향 회전
// ============================================================
function rotate(shape) {
  const rows = shape.length;
  const cols = shape[0].length;
  const rotated = [];

  for (let c = 0; c < cols; c++) {
    const newRow = [];
    for (let r = rows - 1; r >= 0; r--) {
      newRow.push(shape[r][c]);
    }
    rotated.push(newRow);
  }
  return rotated;
}

// ============================================================
//  ■ 블록 보드에 고정
// ============================================================
function placePiece() {
  for (let row = 0; row < currentPiece.shape.length; row++) {
    for (let col = 0; col < currentPiece.shape[row].length; col++) {
      if (!currentPiece.shape[row][col]) continue;
      const bx = currentPiece.x + col;
      const by = currentPiece.y + row;
      if (by >= 0) board[by][bx] = currentPiece.color;
    }
  }
}

// ============================================================
//  ■ 완성된 줄 제거 및 점수·레벨·속도 갱신
//  레벨 1 → 1000ms, 레벨 10 이상 → 100ms 로 선형 감소
// ============================================================
function clearLines() {
  const points = [0, 100, 300, 500, 800];
  let count = 0;

  for (let r = ROWS - 1; r >= 0; r--) {
    if (board[r].every(cell => cell !== null)) {
      board.splice(r, 1);
      board.unshift(new Array(COLS).fill(null));
      count++;
      r++;
    }
  }

  if (count > 0) {
    score        += points[count] * level;
    linesCleared += count;
    level         = Math.floor(linesCleared / 10) + 1;

    // 레벨 1 = 1000ms, 레벨 10 = 100ms 선형 감소
    // 공식: 1000 - (level-1) * (900/9) = 1000 - (level-1) * 100
    dropInterval  = Math.max(100, 1000 - (level - 1) * 100);

    updateUI();
  }
}

// ============================================================
//  ■ 고스트 블록 Y 좌표 계산
//  현재 블록을 충돌이 날 때까지 아래로 내린 위치를 반환합니다.
// ============================================================
function getGhostY() {
  let ghostY = currentPiece.y;
  // y를 1씩 늘리며 충돌이 발생하는 직전까지 내림
  while (!isCollision({ ...currentPiece, y: ghostY + 1 }, 0, 0)) {
    ghostY++;
  }
  return ghostY;
}

// ============================================================
//  ■ 즉시 드롭 (하드 드롭) — Space 키
//  블록을 고스트 위치까지 즉시 이동 후 고정합니다.
// ============================================================
function hardDrop() {
  // 고스트 위치까지 블록을 순간 이동
  currentPiece.y = getGhostY();

  placePiece();
  clearLines();
  createPiece();
  lockDropInput(); // 드롭 후 입력 잠금

  if (isCollision(currentPiece, 0, 0)) {
    gameOver = true;
    draw();
    showGameOver();
  }
}

// ============================================================
//  ■ 블록 고정 공통 처리 (ArrowDown / gameLoop 내 자동 하강)
// ============================================================
function lockPiece() {
  placePiece();
  clearLines();
  createPiece();
  lockDropInput(); // 드롭 후 입력 잠금

  if (isCollision(currentPiece, 0, 0)) {
    gameOver = true;
    draw();
    showGameOver();
    return true; // 게임 오버 신호
  }
  return false;
}

// ============================================================
//  ■ 화면 그리기
// ============================================================
function draw() {
  // ① 배경 초기화
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 격자 선
  ctx.strokeStyle = '#1e293b';
  ctx.lineWidth = 0.5;
  for (let c = 0; c < COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c * BLOCK_SIZE, 0);
    ctx.lineTo(c * BLOCK_SIZE, canvas.height); ctx.stroke();
  }
  for (let r = 0; r < ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * BLOCK_SIZE);
    ctx.lineTo(canvas.width, r * BLOCK_SIZE); ctx.stroke();
  }

  // ② 보드 고정 블록 그리기
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c]) drawBlock(c, r, board[r][c]);
    }
  }

  // ③ 고스트 블록 그리기 (반투명 회색, currentPiece 아래에 그려 덮이게 함)
  if (currentPiece) {
    const ghostY = getGhostY();
    // 현재 블록 위치와 같으면 고스트 표시 불필요
    if (ghostY !== currentPiece.y) {
      for (let row = 0; row < currentPiece.shape.length; row++) {
        for (let col = 0; col < currentPiece.shape[row].length; col++) {
          if (!currentPiece.shape[row][col]) continue;
          const gx = currentPiece.x + col;
          const gy = ghostY + row;
          // 반투명 회색으로 고스트 블록 표시
          ctx.fillStyle = 'rgba(180,180,180,0.25)';
          ctx.fillRect(gx * BLOCK_SIZE, gy * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
          ctx.strokeStyle = 'rgba(180,180,180,0.45)';
          ctx.lineWidth = 1;
          ctx.strokeRect(gx * BLOCK_SIZE, gy * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
        }
      }
    }
  }

  // ④ 현재 조작 블록 그리기
  if (currentPiece) {
    for (let row = 0; row < currentPiece.shape.length; row++) {
      for (let col = 0; col < currentPiece.shape[row].length; col++) {
        if (currentPiece.shape[row][col]) {
          drawBlock(currentPiece.x + col, currentPiece.y + row, currentPiece.color);
        }
      }
    }
  }
}

// ============================================================
//  ■ 키보드 입력 처리
// ============================================================
document.addEventListener('keydown', (e) => {
  if (gameOver) return;
  if (!currentPiece) return;

  // 페이지 스크롤 방지 (화살표·스페이스)
  if (['ArrowLeft','ArrowRight','ArrowDown','ArrowUp',' '].includes(e.key)) {
    e.preventDefault();
  }

  switch (e.key) {
    case 'ArrowLeft':
      // 왼쪽 이동: 충돌 없으면 x 감소
      if (!isCollision(currentPiece, -1, 0)) currentPiece.x -= 1;
      break;

    case 'ArrowRight':
      // 오른쪽 이동: 충돌 없으면 x 증가
      if (!isCollision(currentPiece, 1, 0)) currentPiece.x += 1;
      break;

    case 'ArrowDown':
      // 드롭 잠금 중이면 무시 (이전 드롭 후 키 홀드 방지)
      if (dropLocked) break;

      if (!isCollision(currentPiece, 0, 1)) {
        currentPiece.y += 1;
      } else {
        // 더 내려갈 수 없으면 즉시 고정
        lockPiece();
      }
      break;

    case ' ':
      // 드롭 잠금 중이면 무시
      if (dropLocked) break;
      // 스페이스: 하드 드롭 (고스트 위치로 즉시 이동 후 고정)
      hardDrop();
      break;

    case 'ArrowUp':
      // 회전: 충돌 없으면 적용, 충돌 시 복원
      const rotated  = rotate(currentPiece.shape);
      const prevShape = currentPiece.shape;
      currentPiece.shape = rotated;
      if (isCollision(currentPiece, 0, 0)) {
        currentPiece.shape = prevShape; // 충돌 시 원래 모양 복원
      }
      break;
  }

  draw();
});

// ============================================================
//  ■ 게임 루프
// ============================================================
function gameLoop(timestamp) {
  if (gameOver) return;

  const deltaTime = timestamp - lastTime;

  if (deltaTime > dropInterval) {
    if (!isCollision(currentPiece, 0, 1)) {
      // 자동 한 칸 하강
      currentPiece.y += 1;
    } else {
      // 바닥 도달 시 고정
      const isOver = lockPiece();
      if (isOver) return;
    }
    lastTime = timestamp;
  }

  draw();
  requestAnimationFrame(gameLoop);
}

// ============================================================
//  ■ UI 업데이트
// ============================================================
function updateUI() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('levelDisplay').textContent = level;
  document.getElementById('linesDisplay').textContent = linesCleared;
}

// ============================================================
//  ■ 게임 시작 / 재시작
// ============================================================
function startGame() {
  initBoard();
  score        = 0;
  level        = 1;
  linesCleared = 0;
  gameOver     = false;
  dropInterval = 1000;
  lastTime     = 0;
  nextPiece    = null; // 초기화 후 createPiece가 생성
  dropLocked   = false;
  clearTimeout(dropLockTimer);

  createPiece(); // currentPiece + nextPiece 동시 생성
  updateUI();

  document.getElementById('overlay').classList.remove('show');
  requestAnimationFrame(gameLoop);
}

document.getElementById('restartBtn').addEventListener('click', startGame);

function showGameOver() {
  document.getElementById('overlay').classList.add('show');
}

// 게임 시작!
startGame();
</script>
</body>
</html>
