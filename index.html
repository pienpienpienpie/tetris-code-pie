<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>테트리스 - 바이브 코딩 실습</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #111827;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Consolas', monospace;
            color: #e2e8f0;
        }

        .game-container {
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }

        #gameCanvas {
            border: 2px solid #334155;
            background: #0f172a;
            display: block;
        }

        .side-panel {
            width: 150px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .panel-box {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
        }

            .panel-box h3 {
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: 2px;
                color: #64748b;
                margin-bottom: 8px;
            }

            .panel-box .value {
                font-size: 28px;
                font-weight: bold;
                color: #e2e8f0;
            }

        #overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 16px;
            font-size: 24px;
            color: #f1f5f9;
        }

            #overlay.show {
                display: flex;
            }

        #restartBtn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 28px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Consolas', monospace;
        }

            #restartBtn:hover {
                background: #2563eb;
            }

        .canvas-wrapper {
            position: relative;
        }

        .controls {
            font-size: 12px;
            color: #475569;
            line-height: 1.8;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="300" height="600"></canvas>
            <div id="overlay">
                <div>GAME OVER</div>
                <button id="restartBtn">다시 시작</button>
            </div>
        </div>
        <div class="side-panel">
            <div class="panel-box">
                <h3>점수</h3>
                <div class="value" id="scoreDisplay">0</div>
            </div>
            <div class="panel-box">
                <h3>레벨</h3>
                <div class="value" id="levelDisplay">1</div>
            </div>
            <div class="panel-box">
                <h3>라인</h3>
                <div class="value" id="linesDisplay">0</div>
            </div>
            <div class="panel-box controls">
                <h3>조작법</h3>
                ← → 이동<br>
                ↑ 회전<br>
                ↓ 빠르게<br>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  ■ 상수 정의 (Constants)
        // ============================================================
        const COLS       = 10;
        const ROWS       = 20;
        const BLOCK_SIZE = 30;

        const SHAPES = {
        I: [[1, 1, 1, 1]],
        O: [[1, 1],
        [1, 1]],
        T: [[0, 1, 0],
        [1, 1, 1]],
        S: [[0, 1, 1],
        [1, 1, 0]],
        Z: [[1, 1, 0],
        [0, 1, 1]],
        L: [[1, 0],
        [1, 0],
        [1, 1]],
        J: [[0, 1],
        [0, 1],
        [1, 1]],
        };

        const COLORS = {
        I: '#00f0f0',
        O: '#f0f000',
        T: '#a000f0',
        S: '#00f000',
        Z: '#f00000',
        L: '#f0a000',
        J: '#0000f0',
        };

        const PIECE_TYPES = Object.keys(SHAPES);

        // ============================================================
        //  ■ 캔버스 초기화
        // ============================================================
        const canvas = document.getElementById('gameCanvas');
        const ctx    = canvas.getContext('2d');

        // ============================================================
        //  ■ 게임 상태 변수
        // ============================================================
        let board        = [];
        let currentPiece = null;
        let score        = 0;
        let level        = 1;
        let linesCleared = 0;
        let gameOver     = false;
        let lastTime     = 0;
        let dropInterval = 1000;

        // ============================================================
        //  ■ 단일 블록 그리기 헬퍼
        // ============================================================
        function drawBlock(x, y, color) {
        ctx.fillStyle = color;
        ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE - 1, 4);
        }

        // ============================================================
        //  TODO 1: initBoard()
        //  보드를 ROWS × COLS 크기의 2D 배열로 초기화합니다.
        //  모든 칸은 null(빈칸)로 채웁니다.
        // ============================================================
        function initBoard() {
        board = []; // 기존 보드 초기화

        for (let r = 0; r < ROWS; r++) {
        // 각 행을 null이 COLS개 들어있는 배열로 생성하여 추가
        board.push(new Array(COLS).fill(null));
        }
        }

        // ============================================================
        //  TODO 2: createPiece()
        //  PIECE_TYPES 중 무작위로 1개를 선택해 새 블록을 생성합니다.
        //  x는 보드 중앙, y는 0(맨 위)으로 설정합니다.
        // ============================================================
        function createPiece() {
        // 무작위 블록 종류 선택 (I, O, T, S, Z, L, J 중 하나)
        const type  = PIECE_TYPES[Math.floor(Math.random() * PIECE_TYPES.length)];
        const shape = SHAPES[type];

        // 블록을 보드 가로 중앙에 배치하기 위한 x 좌표 계산
        const startX = Math.floor((COLS - shape[0].length) / 2);

        currentPiece = {
        shape,            // 블록 모양 2D 배열
        color: COLORS[type], // 블록 색상
        x: startX,        // 가로 시작 위치 (중앙)
        y: 0,             // 세로 시작 위치 (최상단)
        };
        }

        // ============================================================
        //  TODO 3: isCollision(piece, dx, dy)
        //  piece를 (dx, dy)만큼 이동했을 때 충돌 여부를 반환합니다.
        //  ① 왼쪽·오른쪽 벽 초과  ② 바닥 초과  ③ 다른 블록과 겹침
        // ============================================================
        function isCollision(piece, dx, dy) {
        for (let row = 0; row < piece.shape.length; row++) {
        for (let col = 0; col < piece.shape[row].length; col++) {

        // 블록이 없는 빈 칸은 충돌 검사 불필요
        if (!piece.shape[row][col]) continue;

        // 이동 후 실제 보드 좌표 계산
        const newX = piece.x + col + dx;
        const newY = piece.y + row + dy;

        // ① 왼쪽 또는 오른쪽 벽 충돌 검사
        if (newX < 0 || newX >= COLS) return true;

        // ② 바닥 충돌 검사
        if (newY >= ROWS) return true;

        // ③ 이미 고정된 다른 블록과의 충돌 검사 (범위 내에서만)
        if (newY >= 0 && board[newY][newX] !== null) return true;
        }
        }

        // 충돌 없음
        return false;
        }

        // ============================================================
        //  TODO 4: rotate(shape)
        //  2D 배열 shape을 90도 시계 방향으로 회전한 새 배열을 반환합니다.
        //  원리: 회전 후 [col][rows-1-row] = 원래 [row][col]
        //        즉, 전치(transpose) 후 각 행을 좌우 반전
        // ============================================================
        function rotate(shape) {
        const rows = shape.length;
        const cols = shape[0].length;

        // 회전 후 크기는 가로·세로가 뒤바뀜 (cols행 × rows열)
        const rotated = [];

        for (let c = 0; c < cols; c++) {
        const newRow = [];
        for (let r = rows - 1; r >= 0; r--) {
        // 시계 방향 90도: 원래 [r][c] → 새 [c][rows-1-r]
        newRow.push(shape[r][c]);
        }
        rotated.push(newRow);
        }

        return rotated;
        }

        // ============================================================
        //  TODO 5: placePiece()
        //  currentPiece를 board에 고정합니다.
        // ============================================================
        function placePiece() {
        for (let row = 0; row < currentPiece.shape.length; row++) {
        for (let col = 0; col < currentPiece.shape[row].length; col++) {
        if (!currentPiece.shape[row][col]) continue;
        const bx = currentPiece.x + col;
        const by = currentPiece.y + row;
        // 보드 범위 내에서만 고정
        if (by >= 0) board[by][bx] = currentPiece.color;
        }
        }
        }

        // ============================================================
        //  TODO 6: clearLines()
        //  가득 찬 행을 제거하고 점수·레벨·속도를 갱신합니다.
        // ============================================================
        function clearLines() {
        const points = [0, 100, 300, 500, 800]; // 줄 수별 기본 점수
        let count = 0; // 이번에 제거한 줄 수

        for (let r = ROWS - 1; r >= 0; r--) {
        // 해당 행의 모든 칸이 null이 아니면 가득 찬 행
        if (board[r].every(cell => cell !== null)) {
        board.splice(r, 1);              // 가득 찬 행 삭제
        board.unshift(new Array(COLS).fill(null)); // 맨 위에 빈 행 추가
        count++;
        r++; // 삭제 후 같은 인덱스를 다시 검사
        }
        }

        if (count > 0) {
        score        += points[count] * level;  // 점수 누적
        linesCleared += count;                  // 총 라인 수 누적
        level         = Math.floor(linesCleared / 10) + 1;         // 10줄마다 레벨 상승
        dropInterval  = Math.max(100, 1000 - (level - 1) * 100);  // 속도 증가 (최소 100ms)
        updateUI();
        }
        }

        // ============================================================
        //  TODO 7: draw()
        //  매 프레임 화면을 다시 그립니다.
        // ============================================================
        function draw() {
        // ① 배경 지우기
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 격자 선 (옅게)
        ctx.strokeStyle = '#1e293b';
        ctx.lineWidth = 0.5;
        for (let c = 0; c < COLS; c++) {
        ctx.beginPath();
        ctx.moveTo(c * BLOCK_SIZE, 0);
        ctx.lineTo(c * BLOCK_SIZE, canvas.height);
        ctx.stroke();
        }
        for (let r = 0; r < ROWS; r++) {
        ctx.beginPath();
        ctx.moveTo(0, r * BLOCK_SIZE);
        ctx.lineTo(canvas.width, r * BLOCK_SIZE);
        ctx.stroke();
        }

        // ② board에 고정된 블록 그리기
        for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
        if (board[r][c]) drawBlock(c, r, board[r][c]);
        }
        }

        // ③ 현재 떨어지는 블록(currentPiece) 그리기
        if (currentPiece) {
        for (let row = 0; row < currentPiece.shape.length; row++) {
        for (let col = 0; col < currentPiece.shape[row].length; col++) {
        if (currentPiece.shape[row][col]) {
        drawBlock(currentPiece.x + col, currentPiece.y + row, currentPiece.color);
        }
        }
        }
        }
        }

        // ============================================================
        //  TODO 8: 키보드 입력 처리
        // ============================================================
        document.addEventListener('keydown', (e) => {
        if (gameOver) return;
        if (!currentPiece) return;

        switch (e.key) {
        case 'ArrowLeft':
        // 왼쪽 이동: 충돌이 없을 때만 x를 1 감소
        if (!isCollision(currentPiece, -1, 0)) currentPiece.x -= 1;
        break;

        case 'ArrowRight':
        // 오른쪽 이동: 충돌이 없을 때만 x를 1 증가
        if (!isCollision(currentPiece, 1, 0)) currentPiece.x += 1;
        break;

        case 'ArrowDown':
        // 빠른 하강: 아래로 이동 가능하면 y 증가, 충돌 시 즉시 고정
        if (!isCollision(currentPiece, 0, 1)) {
        currentPiece.y += 1;
        } else {
        placePiece();
        clearLines();
        createPiece();
        // 새로 생성된 블록이 즉시 충돌하면 게임 오버
        if (isCollision(currentPiece, 0, 0)) {
        gameOver = true;
        showGameOver();
        }
        }
        break;

        case 'ArrowUp':
        // 블록 회전: 회전 후 충돌이 없을 때만 shape 교체
        const rotatedShape = rotate(currentPiece.shape);
        const prevShape    = currentPiece.shape;
        currentPiece.shape = rotatedShape;
        // 회전 후 충돌이 생기면 원래 shape으로 되돌림
        if (isCollision(currentPiece, 0, 0)) {
        currentPiece.shape = prevShape;
        }
        break;
        }

        draw(); // 입력 처리 후 즉시 화면 갱신
        });

        // ============================================================
        //  TODO 9: gameLoop(timestamp)
        //  requestAnimationFrame으로 반복 호출되는 게임 루프
        // ============================================================
        function gameLoop(timestamp) {
        if (gameOver) return;

        const deltaTime = timestamp - lastTime; // 마지막 프레임과의 시간 차

        if (deltaTime > dropInterval) {
        // 자동 하강 주기가 됐을 때
        if (!isCollision(currentPiece, 0, 1)) {
        // 아래에 공간이 있으면 한 칸 내려감
        currentPiece.y += 1;
        } else {
        // 더 이상 내려갈 수 없으면 보드에 고정
        placePiece();
        clearLines();
        createPiece();

        // 새로 생성된 블록이 즉시 충돌하면 게임 오버
        if (isCollision(currentPiece, 0, 0)) {
        gameOver = true;
        draw();        // 마지막 화면 갱신
        showGameOver();
        return;        // 루프 종료
        }
        }
        lastTime = timestamp; // 마지막 하강 시각 갱신
        }

        draw();
        requestAnimationFrame(gameLoop);
        }

        // ============================================================
        //  ■ UI 업데이트 헬퍼
        // ============================================================
        function updateUI() {
        document.getElementById('scoreDisplay').textContent = score;
        document.getElementById('levelDisplay').textContent = level;
        document.getElementById('linesDisplay').textContent = linesCleared;
        }

        // ============================================================
        //  ■ 게임 시작 / 재시작
        // ============================================================
        function startGame() {
        initBoard();
        score        = 0;
        level        = 1;
        linesCleared = 0;
        gameOver     = false;
        dropInterval = 1000;
        lastTime     = 0;

        createPiece();
        updateUI();

        document.getElementById('overlay').classList.remove('show');
        requestAnimationFrame(gameLoop);
        }

        document.getElementById('restartBtn').addEventListener('click', startGame);

        function showGameOver() {
        document.getElementById('overlay').classList.add('show');
        }

        // 게임 시작!
        startGame();
    </script>
</body>
</html>
