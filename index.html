<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>테트리스 - 바이브 코딩 실습</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111827;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Consolas', monospace;
      color: #e2e8f0;
    }
    .game-container { display: flex; gap: 24px; align-items: flex-start; }
    #gameCanvas { border: 2px solid #334155; background: #0f172a; display: block; }
    .side-panel { width: 150px; display: flex; flex-direction: column; gap: 16px; }
    .panel-box {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px;
    }
    .panel-box h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #64748b;
      margin-bottom: 8px;
    }
    .panel-box .value { font-size: 28px; font-weight: bold; color: #e2e8f0; }
    #nextCanvas {
      display: block;
      margin: 0 auto;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 4px;
    }
    #overlay {
      display: none;
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.75);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 16px;
      font-size: 24px;
      color: #f1f5f9;
    }
    #overlay.show { display: flex; }
    #restartBtn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 10px 28px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Consolas', monospace;
    }
    #restartBtn:hover { background: #2563eb; }
    .canvas-wrapper { position: relative; }
    .controls { font-size: 12px; color: #475569; line-height: 1.8; }
  </style>
</head>
<body>

<div class="game-container">
  <div class="canvas-wrapper">
    <canvas id="gameCanvas" width="300" height="600"></canvas>
    <div id="overlay">
      <div>GAME OVER</div>
      <button id="restartBtn">다시 시작</button>
    </div>
  </div>

  <div class="side-panel">
    <div class="panel-box">
      <h3>NEXT</h3>
      <canvas id="nextCanvas" width="126" height="84"></canvas>
    </div>
    <div class="panel-box">
      <h3>점수</h3>
      <div class="value" id="scoreDisplay">0</div>
    </div>
    <div class="panel-box">
      <h3>레벨</h3>
      <div class="value" id="levelDisplay">1</div>
    </div>
    <div class="panel-box">
      <h3>라인</h3>
      <div class="value" id="linesDisplay">0</div>
    </div>
    <div class="panel-box controls">
      <h3>조작법</h3>
      ← → 이동<br>
      ↑ 회전<br>
      ↓ 빠르게<br>
      Space 즉시 드롭<br>
    </div>
  </div>
</div>

<script>
// ============================================================
//  ■ 상수 정의
// ============================================================
const COLS       = 10;
const ROWS       = 20;
const BLOCK_SIZE = 30;
const NEXT_BLOCK = 21;

// 레벨업 기준: 몇 줄 제거마다 레벨 증가
const LINES_PER_LEVEL = 5;

const SHAPES = {
  I: [[1, 1, 1, 1]],
  O: [[1, 1], [1, 1]],
  T: [[0, 1, 0], [1, 1, 1]],
  S: [[0, 1, 1], [1, 1, 0]],
  Z: [[1, 1, 0], [0, 1, 1]],
  L: [[1, 0], [1, 0], [1, 1]],
  J: [[0, 1], [0, 1], [1, 1]],
};

const COLORS = {
  I: '#00f0f0', O: '#f0f000', T: '#a000f0',
  S: '#00f000', Z: '#f00000', L: '#f0a000', J: '#0000f0',
};

const PIECE_TYPES = Object.keys(SHAPES);

// ============================================================
//  ■ 캔버스 초기화
// ============================================================
const canvas     = document.getElementById('gameCanvas');
const ctx        = canvas.getContext('2d');
const nextCanvas = document.getElementById('nextCanvas');
const nCtx       = nextCanvas.getContext('2d');

// ============================================================
//  ■ 게임 상태 변수
// ============================================================
let board        = [];
let currentPiece = null;
let nextPiece    = null;
let score        = 0;
let level        = 1;
let linesCleared = 0;
let gameOver     = false;
let lastTime     = 0;
let dropInterval = 1000;

// 드롭 후 입력 잠금
let dropLocked    = false;
let dropLockTimer = null;
const DROP_LOCK_MS = 250;

// ──────────────────────────────────────────────────────────
//  "Tetris!" 문구 애니메이션 상태
//  tetrisAnim > 0 이면 캔버스에 문구를 표시합니다.
//  매 프레임 감소하여 0이 되면 사라집니다.
// ──────────────────────────────────────────────────────────
let tetrisAnimEnd = 0;   // performance.now() 기준 종료 시각 (ms)
const TETRIS_ANIM_MS = 1200; // 표시 지속 시간 (ms)

function lockDropInput() {
  dropLocked = true;
  clearTimeout(dropLockTimer);
  dropLockTimer = setTimeout(() => { dropLocked = false; }, DROP_LOCK_MS);
}

// ============================================================
//  ■ 단일 블록 그리기 헬퍼 (메인 캔버스용)
// ============================================================
function drawBlock(x, y, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE - 1, 4);
}

// ============================================================
//  ■ 보드 초기화
// ============================================================
function initBoard() {
  board = [];
  for (let r = 0; r < ROWS; r++) {
    board.push(new Array(COLS).fill(null));
  }
}

// ============================================================
//  ■ 블록 생성 (nextPiece → currentPiece, 새 nextPiece 생성)
// ============================================================
function createPiece() {
  if (nextPiece) {
    const shape  = nextPiece.shape;
    const color  = nextPiece.color;
    const startX = Math.floor((COLS - shape[0].length) / 2);
    currentPiece = { shape, color, x: startX, y: 0 };
  } else {
    // 게임 시작 시 최초 1회
    const type   = PIECE_TYPES[Math.floor(Math.random() * PIECE_TYPES.length)];
    const shape  = SHAPES[type];
    const startX = Math.floor((COLS - shape[0].length) / 2);
    currentPiece = { shape, color: COLORS[type], x: startX, y: 0 };
  }

  const nextType = PIECE_TYPES[Math.floor(Math.random() * PIECE_TYPES.length)];
  nextPiece = { shape: SHAPES[nextType], color: COLORS[nextType] };
  drawNextPiece();
}

// ============================================================
//  ■ NEXT 미리보기 캔버스 그리기
// ============================================================
function drawNextPiece() {
  nCtx.fillStyle = '#0f172a';
  nCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
  if (!nextPiece) return;

  const shape   = nextPiece.shape;
  const color   = nextPiece.color;
  const cols    = shape[0].length;
  const rows    = shape.length;
  const offsetX = Math.floor((nextCanvas.width  - cols * NEXT_BLOCK) / 2);
  const offsetY = Math.floor((nextCanvas.height - rows * NEXT_BLOCK) / 2);

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (!shape[r][c]) continue;
      const px = offsetX + c * NEXT_BLOCK;
      const py = offsetY + r * NEXT_BLOCK;
      nCtx.fillStyle = color;
      nCtx.fillRect(px, py, NEXT_BLOCK - 1, NEXT_BLOCK - 1);
      nCtx.fillStyle = 'rgba(255,255,255,0.2)';
      nCtx.fillRect(px, py, NEXT_BLOCK - 1, 3);
    }
  }
}

// ============================================================
//  ■ 충돌 감지
// ============================================================
function isCollision(piece, dx, dy) {
  for (let row = 0; row < piece.shape.length; row++) {
    for (let col = 0; col < piece.shape[row].length; col++) {
      if (!piece.shape[row][col]) continue;
      const newX = piece.x + col + dx;
      const newY = piece.y + row + dy;
      if (newX < 0 || newX >= COLS) return true;
      if (newY >= ROWS)             return true;
      if (newY >= 0 && board[newY][newX] !== null) return true;
    }
  }
  return false;
}

// ============================================================
//  ■ 90도 시계 방향 회전
// ============================================================
function rotate(shape) {
  const rows = shape.length;
  const cols = shape[0].length;
  const rotated = [];
  for (let c = 0; c < cols; c++) {
    const newRow = [];
    for (let r = rows - 1; r >= 0; r--) newRow.push(shape[r][c]);
    rotated.push(newRow);
  }
  return rotated;
}

// ============================================================
//  ■ 블록 보드에 고정
// ============================================================
function placePiece() {
  for (let row = 0; row < currentPiece.shape.length; row++) {
    for (let col = 0; col < currentPiece.shape[row].length; col++) {
      if (!currentPiece.shape[row][col]) continue;
      const bx = currentPiece.x + col;
      const by = currentPiece.y + row;
      if (by >= 0) board[by][bx] = currentPiece.color;
    }
  }
}

// ============================================================
//  ■ 완성 줄 제거 및 점수·레벨·속도 갱신
//
//  [기본 점수]  1줄=100, 2줄=300, 3줄=500, 4줄=800  × level
//  [추가 보너스] 2줄=+100, 3줄=+300, 4줄+=+800 (고정, level 미적용)
//                1줄은 추가 보너스 없음
//
//  [레벨]  LINES_PER_LEVEL(5)줄 제거마다 레벨 +1
//  [속도]  레벨당 100ms 감소, 최소 100ms
//           level 1 → 1000ms, level 10 → 100ms
// ============================================================
function clearLines() {
  // 기본 점수 테이블 (줄 수 인덱스)
  const basePoints  = [0, 100, 300, 500, 800];
  // 추가 보너스 테이블 (2줄부터 적용, level 미적용 고정 보너스)
  const bonusPoints = [0,   0, 100, 300, 800];

  let count = 0;

  for (let r = ROWS - 1; r >= 0; r--) {
    if (board[r].every(cell => cell !== null)) {
      board.splice(r, 1);
      board.unshift(new Array(COLS).fill(null));
      count++;
      r++; // 삭제 후 같은 인덱스 재검사
    }
  }

  if (count > 0) {
    // 4줄 초과 방어 (이론상 불가능하나 안전 처리)
    const idx = Math.min(count, 4);

    // 기본 점수 (레벨 배율 적용)
    score += basePoints[idx] * level;

    // 추가 보너스 (2줄 이상, 고정값)
    score += bonusPoints[idx];

    linesCleared += count;

    // 레벨: LINES_PER_LEVEL줄마다 1 증가
    level = Math.floor(linesCleared / LINES_PER_LEVEL) + 1;

    // 속도: 레벨당 100ms 감소, 최소 100ms
    // level 1 = 1000ms, level 10 = 100ms
    dropInterval = Math.max(100, 1000 - (level - 1) * 100);

    // 4줄 동시 제거 → "Tetris!" 애니메이션 트리거
    if (count >= 4) {
      tetrisAnimEnd = performance.now() + TETRIS_ANIM_MS;
    }

    updateUI();
  }
}

// ============================================================
//  ■ 고스트 블록 Y 좌표 계산
// ============================================================
function getGhostY() {
  let ghostY = currentPiece.y;
  while (!isCollision({ ...currentPiece, y: ghostY + 1 }, 0, 0)) {
    ghostY++;
  }
  return ghostY;
}

// ============================================================
//  ■ 하드 드롭 (Space)
// ============================================================
function hardDrop() {
  currentPiece.y = getGhostY();
  placePiece();
  clearLines();
  createPiece();
  lockDropInput();
  if (isCollision(currentPiece, 0, 0)) {
    gameOver = true;
    draw();
    showGameOver();
  }
}

// ============================================================
//  ■ 블록 고정 공통 처리
// ============================================================
function lockPiece() {
  placePiece();
  clearLines();
  createPiece();
  lockDropInput();
  if (isCollision(currentPiece, 0, 0)) {
    gameOver = true;
    draw();
    showGameOver();
    return true;
  }
  return false;
}

// ============================================================
//  ■ "Tetris!" 문구 캔버스에 그리기
//  투명도는 남은 시간 비율로 페이드아웃 처리합니다.
// ============================================================
function drawTetrisAnim() {
  const now       = performance.now();
  const remaining = tetrisAnimEnd - now;
  if (remaining <= 0) return;

  // 남은 시간 비율 (1.0 → 0.0)
  const ratio = remaining / TETRIS_ANIM_MS;

  // 후반 30% 구간에서 페이드아웃
  const alpha = ratio < 0.3 ? ratio / 0.3 : 1.0;

  // 약간 위아래 떠오르는 Y 오프셋 (초반에 살짝 위로)
  const floatY = (1 - ratio) * 18;

  const cx = canvas.width / 2;
  const cy = canvas.height * 0.28 + floatY;

  ctx.save();

  // ── 글로우 효과: 여러 겹 그림자 ──
  ctx.globalAlpha = alpha;
  ctx.textAlign   = 'center';
  ctx.textBaseline = 'middle';

  // 바깥 글로우 (큰 blur, 노란색/흰색 혼합)
  ctx.font        = 'bold 46px Consolas, monospace';
  ctx.shadowColor = '#ffe066';
  ctx.shadowBlur  = 40;
  ctx.fillStyle   = '#ffe066';
  ctx.fillText('Tetris!', cx, cy);

  // 중간 글로우
  ctx.shadowColor = '#ffffff';
  ctx.shadowBlur  = 20;
  ctx.fillStyle   = '#ffffff';
  ctx.fillText('Tetris!', cx, cy);

  // 최상단 선명한 흰색 텍스트
  ctx.shadowBlur  = 6;
  ctx.fillStyle   = '#ffffff';
  ctx.fillText('Tetris!', cx, cy);

  ctx.restore();
}

// ============================================================
//  ■ 화면 그리기
// ============================================================
function draw() {
  // ① 배경 초기화
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 격자 선
  ctx.strokeStyle = '#1e293b';
  ctx.lineWidth = 0.5;
  for (let c = 0; c < COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c * BLOCK_SIZE, 0);
    ctx.lineTo(c * BLOCK_SIZE, canvas.height); ctx.stroke();
  }
  for (let r = 0; r < ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * BLOCK_SIZE);
    ctx.lineTo(canvas.width, r * BLOCK_SIZE); ctx.stroke();
  }

  // ② 보드 고정 블록 그리기
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c]) drawBlock(c, r, board[r][c]);
    }
  }

  // ③ 고스트 블록 (드롭 위치 미리보기)
  if (currentPiece) {
    const ghostY = getGhostY();
    if (ghostY !== currentPiece.y) {
      for (let row = 0; row < currentPiece.shape.length; row++) {
        for (let col = 0; col < currentPiece.shape[row].length; col++) {
          if (!currentPiece.shape[row][col]) continue;
          const gx = currentPiece.x + col;
          const gy = ghostY + row;
          ctx.fillStyle = 'rgba(180,180,180,0.25)';
          ctx.fillRect(gx * BLOCK_SIZE, gy * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
          ctx.strokeStyle = 'rgba(180,180,180,0.45)';
          ctx.lineWidth = 1;
          ctx.strokeRect(gx * BLOCK_SIZE, gy * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
        }
      }
    }
  }

  // ④ 현재 조작 블록 그리기
  if (currentPiece) {
    for (let row = 0; row < currentPiece.shape.length; row++) {
      for (let col = 0; col < currentPiece.shape[row].length; col++) {
        if (currentPiece.shape[row][col]) {
          drawBlock(currentPiece.x + col, currentPiece.y + row, currentPiece.color);
        }
      }
    }
  }

  // ⑤ "Tetris!" 애니메이션 (블록 위에 렌더링)
  drawTetrisAnim();
}

// ============================================================
//  ■ 키보드 입력 처리
// ============================================================
document.addEventListener('keydown', (e) => {
  if (gameOver) return;
  if (!currentPiece) return;

  if (['ArrowLeft','ArrowRight','ArrowDown','ArrowUp',' '].includes(e.key)) {
    e.preventDefault();
  }

  switch (e.key) {
    case 'ArrowLeft':
      if (!isCollision(currentPiece, -1, 0)) currentPiece.x -= 1;
      break;

    case 'ArrowRight':
      if (!isCollision(currentPiece, 1, 0)) currentPiece.x += 1;
      break;

    case 'ArrowDown':
      if (dropLocked) break;
      if (!isCollision(currentPiece, 0, 1)) {
        currentPiece.y += 1;
      } else {
        lockPiece();
      }
      break;

    case ' ':
      if (dropLocked) break;
      hardDrop();
      break;

    case 'ArrowUp':
      const rotated   = rotate(currentPiece.shape);
      const prevShape = currentPiece.shape;
      currentPiece.shape = rotated;
      if (isCollision(currentPiece, 0, 0)) currentPiece.shape = prevShape;
      break;
  }

  draw();
});

// ============================================================
//  ■ 게임 루프
// ============================================================
function gameLoop(timestamp) {
  if (gameOver) return;

  const deltaTime = timestamp - lastTime;

  if (deltaTime > dropInterval) {
    if (!isCollision(currentPiece, 0, 1)) {
      currentPiece.y += 1;
    } else {
      const isOver = lockPiece();
      if (isOver) return;
    }
    lastTime = timestamp;
  }

  draw();
  requestAnimationFrame(gameLoop);
}

// ============================================================
//  ■ UI 업데이트
// ============================================================
function updateUI() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('levelDisplay').textContent = level;
  document.getElementById('linesDisplay').textContent = linesCleared;
}

// ============================================================
//  ■ 게임 시작 / 재시작
// ============================================================
function startGame() {
  initBoard();
  score         = 0;
  level         = 1;
  linesCleared  = 0;
  gameOver      = false;
  dropInterval  = 1000;
  lastTime      = 0;
  nextPiece     = null;
  dropLocked    = false;
  tetrisAnimEnd = 0;
  clearTimeout(dropLockTimer);

  createPiece();
  updateUI();

  document.getElementById('overlay').classList.remove('show');
  requestAnimationFrame(gameLoop);
}

document.getElementById('restartBtn').addEventListener('click', startGame);

function showGameOver() {
  document.getElementById('overlay').classList.add('show');
}

startGame();
</script>
</body>
</html>
